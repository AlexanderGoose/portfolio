<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    <!-- leaflet stuff -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
    <!-- Make sure you put this AFTER Leaflet's CSS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
</head>

<body>
    <div id="map" style="height: 100vh;"></div>

    <script>
        var map = L.map('map').setView([39.7402157, -104.8505299], 13);

        L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(map);

        var breweries = JSON.parse('{{ breweries | tojson | safe }}');

        breweries.forEach((brewery, index) => {

            const lat = parseFloat(brewery.latitude);
            const lon = parseFloat(brewery.longitude);

            L.marker([brewery.latitude, brewery.longitude])
                .addTo(map)
                .bindPopup(brewery.name);
        });
    </script>
    <p>{{ breweries }}</p>

</body>
</html>
